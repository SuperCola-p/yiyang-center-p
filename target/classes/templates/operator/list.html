<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="'操作员管理'">操作员管理</title>
</head>
<body>
    <th:block layout:fragment="content">
        <div class="page-title">
            <i class="fas fa-user-cog"></i> 操作员管理
        </div>

        <!-- 页面说明 -->
        <div class="alert alert-info">
            <i class="fas fa-info-circle"></i> 操作员管理仅对 ADMIN 类型用户开放，可管理系统的所有操作员账号。
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <form class="form-inline">
                <div class="input-group mr-3" style="width:280px;">
                    <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="搜索登录账号或姓名...">
                    <div class="input-group-append">
                        <button class="btn btn-primary btn-sm" type="button" onclick="loadOperators()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <button type="button" class="btn btn-success btn-sm" data-toggle="modal" data-target="#addModal">
                    <i class="fas fa-plus"></i> 新增操作员
                </button>
            </form>
        </div>

        <!-- 操作员列表 -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-list"></i> 操作员列表
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>登录账号</th>
                                <th>真实姓名</th>
                                <th>操作员类型</th>
                                <th style="width: 180px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="operatorTableBody">
                            <tr id="loadingRow">
                                <td colspan="4" class="loading-state">
                                    <i class="fas fa-spinner fa-spin"></i> 加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 新增弹窗 -->
        <div class="modal fade" id="addModal" tabindex="-1" role="dialog">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-user-plus"></i> 新增操作员</h5>
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="addForm">
                            <div class="form-group">
                                <label>登录账号 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="addLoginCode" placeholder="请输入登录账号" required>
                            </div>
                            <div class="form-group">
                                <label>密码 <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" id="addPassword" placeholder="请输入密码" required>
                            </div>
                            <div class="form-group">
                                <label>真实姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="addRealName" placeholder="请输入真实姓名" required>
                            </div>
                            <div class="form-group">
                                <label>操作员类型 <span class="text-danger">*</span></label>
                                <select class="form-control" id="addOperatorType">
                                    <option value="STAFF">STAFF（普通员工）</option>
                                    <option value="ADMIN">ADMIN（管理员）</option>
                                </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" onclick="addOperator()">
                            <i class="fas fa-save"></i> 保存
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 编辑弹窗 -->
        <div class="modal fade" id="editModal" tabindex="-1" role="dialog">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-user-edit"></i> 编辑操作员</h5>
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="editForm">
                            <div class="form-group">
                                <label>登录账号</label>
                                <input type="text" class="form-control" id="editLoginCode" readonly>
                            </div>
                            <div class="form-group">
                                <label>新密码（留空则不修改）</label>
                                <input type="password" class="form-control" id="editPassword" placeholder="留空则不修改密码">
                            </div>
                            <div class="form-group">
                                <label>真实姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editRealName" placeholder="请输入真实姓名" required>
                            </div>
                            <div class="form-group">
                                <label>操作员类型 <span class="text-danger">*</span></label>
                                <select class="form-control" id="editOperatorType">
                                    <option value="STAFF">STAFF（普通员工）</option>
                                    <option value="ADMIN">ADMIN（管理员）</option>
                                </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" onclick="editOperator()">
                            <i class="fas fa-save"></i> 保存修改
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="script-extra">
    <script>
    var editingLoginCode = null;

    $(function() {
        loadOperators();
    });

    // 加载操作员列表
    function loadOperators() {
        var keyword = $('#searchInput').val().trim();
        var url = '/api/operators';
        if (keyword) {
            url += '?keyword=' + encodeURIComponent(keyword);
        }

        $('#operatorTableBody').html(
            '<tr><td colspan="4" class="loading-state">' +
            '<i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr>'
        );

        $.get(url, function(resp) {
            var data = resp.data || resp || [];
            if (!Array.isArray(data)) {
                data = [data];
            }
            renderTable(data);
        }).fail(function() {
        $('#operatorTableBody').html(
            '<tr><td colspan="4" class="empty-state">' +
            '<i class="fas fa-exclamation-circle"></i><p>加载失败，请刷新重试</p></td></tr>'
        );
        });
    }

    // 渲染表格
    function renderTable(data) {
        if (!data || data.length === 0) {
            $('#operatorTableBody').html(
                '<tr><td colspan="4" class="empty-state">' +
                '<i class="fas fa-inbox"></i><p>暂无操作员数据</p></td></tr>'
            );
            return;
        }

        var html = '';
        $.each(data, function(i, item) {
            var typeBadge = item.operatorType === 'ADMIN'
                ? '<span class="badge badge-danger">ADMIN</span>'
                : '<span class="badge badge-secondary">STAFF</span>';
            html += '<tr>' +
                '<td>' + escapeHtml(item.loginCode) + '</td>' +
                '<td>' + escapeHtml(item.realName || '-') + '</td>' +
                '<td>' + typeBadge + '</td>' +
                '<td>' +
                '    <button type="button" class="btn btn-outline-info btn-sm btn-action" onclick="openEditModal(\'' + escapeHtml(item.loginCode) + '\')" title="编辑">' +
                '        <i class="fas fa-edit"></i>' +
                '    </button>' +
                '    <button type="button" class="btn btn-outline-danger btn-sm btn-action" onclick="deleteOperator(\'' + escapeHtml(item.loginCode) + '\')" title="删除">' +
                '        <i class="fas fa-trash"></i>' +
                '    </button>' +
                '</td>' +
                '</tr>';
        });
        $('#operatorTableBody').html(html);
    }

    // HTML 转义
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // 新增操作员
    function addOperator() {
        var loginCode = $('#addLoginCode').val().trim();
        var password = $('#addPassword').val().trim();
        var realName = $('#addRealName').val().trim();
        var operatorType = $('#addOperatorType').val();

        if (!loginCode) { showToast('请输入登录账号', 'warning'); return; }
        if (!password) { showToast('请输入密码', 'warning'); return; }
        if (!realName) { showToast('请输入真实姓名', 'warning'); return; }

        $.ajax({
            url: '/api/operators',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                loginCode: loginCode,
                password: password,
                realName: realName,
                operatorType: operatorType
            }),
            success: function(resp) {
                if (resp && resp.error) {
                    showToast(resp.error, 'error');
                    return;
                }
                showToast('新增操作员成功', 'success');
                $('#addModal').modal('hide');
                $('#addForm')[0].reset();
                $('#addOperatorType').val('STAFF');
                loadOperators();
            },
            error: function(xhr) {
                var msg = '新增失败';
                try {
                    var r = JSON.parse(xhr.responseText);
                    msg = r.error || r.message || msg;
                } catch(e) {}
                showToast(msg, 'error');
            }
        });
    }

    // 打开编辑弹窗
    function openEditModal(loginCode) {
        editingLoginCode = loginCode;
        $.get('/api/operators/' + encodeURIComponent(loginCode), function(resp) {
            var data = resp.data || resp;
            $('#editLoginCode').val(data.loginCode);
            $('#editRealName').val(data.realName || '');
            $('#editOperatorType').val(data.operatorType || 'STAFF');
            $('#editPassword').val('');
            $('#editModal').modal('show');
        }).fail(function() {
            showToast('获取操作员信息失败', 'error');
        });
    }

    // 编辑操作员
    function editOperator() {
        var loginCode = editingLoginCode;
        var realName = $('#editRealName').val().trim();
        var operatorType = $('#editOperatorType').val();
        var password = $('#editPassword').val().trim();

        if (!realName) { showToast('请输入真实姓名', 'warning'); return; }

        var body = {
            realName: realName,
            operatorType: operatorType
        };
        if (password) {
            body.password = password;
        }

        $.ajax({
            url: '/api/operators/' + encodeURIComponent(loginCode),
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(body),
            success: function(resp) {
                if (resp && resp.error) {
                    showToast(resp.error, 'error');
                    return;
                }
                showToast('修改操作员成功', 'success');
                $('#editModal').modal('hide');
                loadOperators();
            },
            error: function(xhr) {
                var msg = '修改失败';
                try {
                    var r = JSON.parse(xhr.responseText);
                    msg = r.error || r.message || msg;
                } catch(e) {}
                showToast(msg, 'error');
            }
        });
    }

    // 删除操作员
    function deleteOperator(loginCode) {
        showConfirm('确定要删除操作员 "' + loginCode + '" 吗？此操作不可恢复。', function(ok) {
            if (!ok) return;
            $.ajax({
                url: '/api/operators/' + encodeURIComponent(loginCode),
                type: 'DELETE',
                success: function(resp) {
                    if (resp && resp.error) {
                        showToast(resp.error, 'error');
                        return;
                    }
                    showToast('删除操作员成功', 'success');
                    loadOperators();
                },
                error: function(xhr) {
                    var msg = '删除失败';
                    try {
                        var r = JSON.parse(xhr.responseText);
                        msg = r.error || r.message || msg;
                    } catch(e) {}
                    showToast(msg, 'error');
                }
            });
        });
    }
    </script>
    </th:block>
</body>
</html>
