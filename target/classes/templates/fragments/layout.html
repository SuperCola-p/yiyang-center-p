<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: '颐养中心管理系统'">颐养中心管理系统</title>
    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome 5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <th:block layout:fragment="head-extra"></th:block>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <a class="navbar-brand" href="/page/home">
            <i class="fas fa-heartbeat"></i> 东软颐养中心
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto" th:if="${session.loginUser != null}">
                <li class="nav-item">
                    <a class="nav-link" href="/page/home"><i class="fas fa-home"></i> 首页</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        <i class="fas fa-notes-medical"></i> 护理管理
                    </a>
                    <div class="dropdown-menu">
                        <a class="dropdown-item" href="/page/nursing-items"><i class="fas fa-list"></i> 护理项目</a>
                        <a class="dropdown-item" href="/page/nursing-levels"><i class="fas fa-layer-group"></i> 护理等级</a>
                        <a class="dropdown-item" href="/page/nursing-records"><i class="fas fa-clipboard-list"></i> 护理记录</a>
                        <a class="dropdown-item" href="/page/clients/nursing"><i class="fas fa-concierge-bell"></i> 护理服务设置</a>
                    </div>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/page/beds"><i class="fas fa-bed"></i> 床位管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/page/clients"><i class="fas fa-users"></i> 老人管理</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        <i class="fas fa-file-alt"></i> 申请管理
                    </a>
                    <div class="dropdown-menu">
                        <a class="dropdown-item" href="/page/check-out-applications"><i class="fas fa-sign-out-alt"></i> 退住申请</a>
                        <a class="dropdown-item" href="/page/leave-applications"><i class="fas fa-calendar-alt"></i> 请假管理</a>
                    </div>
                </li>
                <li class="nav-item" th:if="${session.loginUser != null and session.loginUser.operatorType == 'ADMIN'}">
                    <a class="nav-link" href="/page/operators"><i class="fas fa-user-cog"></i> 操作员</a>
                </li>
            </ul>
            <ul class="navbar-nav" th:if="${session.loginUser != null}">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                        <i class="fas fa-user-circle"></i>
                        <span th:text="${session.loginUser.realName}">用户</span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <span class="dropdown-item-text text-muted">
                            <i class="fas fa-tag"></i>
                            类型: <span th:text="${session.loginUser.operatorType}">ADMIN</span>
                        </span>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item text-danger" href="/page/logout">
                            <i class="fas fa-sign-out-alt"></i> 退出登录
                        </a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <div class="container-fluid main-content">
        <th:block layout:fragment="content"></th:block>
    </div>

    <!-- 页脚 -->
    <footer class="footer text-center text-muted">
        <small>&copy; 2024 东软颐养中心管理系统 v1.0</small>
    </footer>

    <!-- jQuery + Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
    <th:block layout:fragment="script-extra"></th:block>
</body>
</html>
