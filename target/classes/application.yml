server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/yiyang_center?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: djb0928djb
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update       # 开发阶段自动建表/更新表结构，生产环境建议改为 none
    show-sql: false          # 开发时改为 true 可查看SQL
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  thymeleaf:
    cache: false             # 开发时禁用模板缓存，方便热更新
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.yiyang: debug
    org.springframework: info
