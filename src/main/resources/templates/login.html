<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 东软颐养中心</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="card-body">
                <div class="login-title">
                    <i class="fas fa-heartbeat" style="font-size: 3rem; color: #667eea;"></i>
                    <h3 class="mt-3">东软颐养中心</h3>
                    <p>后台管理系统</p>
                </div>

                <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> 登录账号</label>
                        <input type="text" class="form-control" id="loginCode" placeholder="请输入登录账号" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> 密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg mt-4">
                        <i class="fas fa-sign-in-alt"></i> 登 录
                    </button>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">默认账号: admin / 密码: 123456</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script>
    $(function() {
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            var loginCode = $('#loginCode').val().trim();
            var password = $('#password').val().trim();

            if (!loginCode || !password) {
                $('#errorMsg').removeClass('d-none').text('请输入账号和密码');
                return;
            }

            $.ajax({
                url: '/api/operators/login',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ loginCode: loginCode, password: password }),
                success: function(resp) {
                    if (resp.code === 200 || resp.code === undefined) {
                        // 登录成功，Session 已在服务端设置，直接跳转
                        window.location.href = '/page/home';
                    } else {
                        $('#errorMsg').removeClass('d-none').text(resp.message || '登录失败');
                    }
                },
                error: function() {
                    $('#errorMsg').removeClass('d-none').text('登录失败，请检查网络连接');
                }
            });
        });
    });
    </script>
</body>
</html>
