<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title th:text="'护理记录'">护理记录</title>
</head>
<body>
    <th:block layout:fragment="content">
        <div class="page-title">
            <i class="fas fa-clipboard-list"></i> 护理记录
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <form class="form-inline">
                <div class="form-group mr-3">
                    <label class="mr-2"><i class="fas fa-user"></i> 老人：</label>
                    <select class="form-control form-control-sm" id="clientFilter">
                        <option value="">全部老人</option>
                    </select>
                </div>
                <button type="button" class="btn btn-primary btn-sm mr-2" id="searchBtn">
                    <i class="fas fa-search"></i> 查询
                </button>
                <a th:href="@{/page/nursing-records/add}" class="btn btn-success btn-sm">
                    <i class="fas fa-plus"></i> 新增记录
                </a>
            </form>
        </div>

        <!-- 数据卡片 -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-list"></i> 护理记录列表
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>老人姓名</th>
                                <th>护理项目</th>
                                <th>护理员</th>
                                <th>护理时间</th>
                                <th>执行次数</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordTableBody">
                            <tr id="noDataRow">
                                <td colspan="8" class="empty-state">
                                    <i class="fas fa-inbox"></i>
                                    <p>暂无护理记录</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 删除确认弹窗 -->
        <div class="modal fade" id="deleteModal" tabindex="-1" role="dialog">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-exclamation-triangle text-warning"></i> 确认删除</h5>
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <p>确定要删除这条护理记录吗？此操作不可撤销。</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="script-extra">
    <script>
    $(function() {
        var deleteId = null;

        // 加载老人下拉
        $.get('/api/clients', function(resp) {
            var clients = resp.data || resp || [];
            var sel = $('#clientFilter');
            clients.forEach(function(c) {
                if (!c.deleted) {
                    sel.append('<option value="' + c.id + '">' + c.name + '</option>');
                }
            });
        });

        // 加载护理记录
        function loadRecords(clientId) {
            var url = '/api/nursing-records';
            if (clientId) {
                url += '?clientId=' + clientId;
            }
            showLoading('#recordTableBody', 8);
            $.get(url, function(resp) {
                var records = resp.data || resp || [];
                var tbody = $('#recordTableBody');
                tbody.empty();
                if (records.length === 0) {
                    showEmpty('#recordTableBody', 8, '暂无护理记录');
                    return;
                }
                records.forEach(function(r, idx) {
                    var clientName = r.client ? r.client.name : (r.clientName || '-');
                    var itemName = r.nursingItem ? r.nursingItem.name : (r.nursingItemName || '-');
                    var nurseName = r.healthAssistantName || r.healthAssistantId || '-';
                    var time = r.nursingTime || '-';
                    tbody.append(
                        '<tr>' +
                            '<td>' + (idx + 1) + '</td>' +
                            '<td>' + clientName + '</td>' +
                            '<td>' + itemName + '</td>' +
                            '<td>' + nurseName + '</td>' +
                            '<td>' + time + '</td>' +
                            '<td>' + (r.execQuantity || 0) + '</td>' +
                            '<td>' + (r.remarks || '-') + '</td>' +
                            '<td>' +
                                '<button class="btn btn-outline-danger btn-sm btn-action delete-btn" data-id="' + r.id + '" title="删除">' +
                                    '<i class="fas fa-trash"></i>' +
                                '</button>' +
                            '</td>' +
                        '</tr>'
                    );
                });
            });
        }

        // 搜索
        $('#searchBtn').click(function() {
            loadRecords($('#clientFilter').val());
        });

        // 删除弹窗
        $(document).on('click', '.delete-btn', function() {
            deleteId = $(this).data('id');
            $('#deleteModal').modal('show');
        });

        $('#confirmDeleteBtn').click(function() {
            if (deleteId) {
                $.ajax({
                    url: '/api/nursing-records/' + deleteId,
                    type: 'DELETE',
                    success: function(resp) {
                        if (resp.code === 200 || resp.success) {
                            $('#deleteModal').modal('hide');
                            loadRecords($('#clientFilter').val());
                            showToast('删除成功', 'success');
                        } else {
                            showToast(resp.message || '删除失败', 'danger');
                        }
                    },
                    error: function() {
                        showToast('删除失败，请稍后重试', 'danger');
                    }
                });
            }
        });

        // 初始加载
        loadRecords('');
    });
    </script>
    </th:block>
</body>
</html>
