<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>护理等级管理</title>
</head>
<body>
    <th:block layout:fragment="content">
        <div class="page-title">
            <i class="fas fa-layer-group"></i> 护理等级管理
        </div>

        <div class="search-bar">
            <div class="row">
                <div class="col-md-6">
                    <a href="/page/nursing-levels/add" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 新增护理等级
                    </a>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fas fa-list"></i> 护理等级列表</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>等级名称</th>
                            <th>状态</th>
                            <th>关联项目数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="levelTableBody">
                        <tr id="loadingRow">
                            <td colspan="5" class="loading-state">
                                <i class="fas fa-spinner fa-spin"></i> 加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 删除确认弹窗 -->
        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-exclamation-triangle text-danger"></i> 确认删除</h5>
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <p>确定要删除护理等级 <strong id="deleteLevelName"></strong> 吗？</p>
                        <p class="text-danger"><small>此操作不可恢复。</small></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 关联项目弹窗 -->
        <div class="modal fade" id="linkItemsModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="fas fa-link"></i> 设置关联项目</h5>
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="linkLevelId">
                        <div id="itemCheckboxList"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" onclick="saveLinkItems()">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <th:block layout:fragment="script-extra">
    <script>
    function loadData() {
        // 显示加载状态
        $('#levelTableBody').html(
            '<tr><td colspan="5" class="loading-state">' +
            '<i class="fas fa-spinner fa-spin"></i> 加载中...</td></tr>'
        );
        $.get('/api/nursing-levels', function(resp) {
            var data = resp.data || resp || [];
            // 过滤已删除的数据
            data = data.filter(function(lv) { return !lv.deleted; });
            if (data.length === 0) {
                $('#levelTableBody').html(
                    '<tr><td colspan="5" class="empty-state">' +
                    '<i class="fas fa-inbox"></i><p>暂无护理等级数据</p></td></tr>'
                );
                return;
            }
            var html = '';
            data.forEach(function(lv) {
                var statusBadge = lv.status === 'ENABLED'
                    ? '<span class="badge badge-success">启用</span>'
                    : '<span class="badge badge-secondary">禁用</span>';
                html += '<tr>' +
                    '<td>' + lv.id + '</td>' +
                    '<td>' + lv.levelName + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td id="itemCount_' + lv.id + '">-</td>' +
                    '<td>' +
                        '<a href="/page/nursing-levels/edit?id=' + lv.id + '" class="btn btn-sm btn-info btn-action">编辑</a>' +
                        '<button class="btn btn-sm btn-warning btn-action" onclick="toggleLevelStatus(' + lv.id + ')">' +
                            (lv.status === 'ENABLED' ? '禁用' : '启用') +
                        '</button>' +
                        '<button class="btn btn-sm btn-secondary btn-action" onclick="openLinkItems(' + lv.id + ')">关联项目</button>' +
                        '<button class="btn btn-sm btn-danger btn-action" onclick="deleteLevel(' + lv.id + ', \'' + lv.levelName.replace(/'/g, "\\'") + '\')">删除</button>' +
                    '</td></tr>';
            });
            $('#levelTableBody').html(html);
            // 加载每个等级的关联数
            data.forEach(function(lv) {
                loadItemCount(lv.id);
            });
        });
    }

    function loadItemCount(levelId) {
        $.get('/api/nursing-levels/' + levelId + '/items', function(resp) {
            var items = resp.data || resp || [];
            // items 可能是对象数组或ID数组，统一取长度
            var count = Array.isArray(items) ? items.length : 0;
            $('#itemCount_' + levelId).text(count);
        });
    }

    function toggleLevelStatus(id) {
        $.ajax({
            url: '/api/nursing-levels/' + id + '/status',
            type: 'PUT',
            success: function() { showToast('状态已切换', 'success'); loadData(); },
            error: function() { showToast('操作失败', 'error'); }
        });
    }

    var deleteLevelId = null;

    function deleteLevel(id, levelName) {
        deleteLevelId = id;
        $('#deleteLevelName').text(levelName || '该护理等级');
        $('#deleteModal').modal('show');
    }

    $('#confirmDeleteBtn').click(function() {
        if (deleteLevelId == null) return;
        $.ajax({
            url: '/api/nursing-levels/' + deleteLevelId,
            type: 'DELETE',
            success: function() {
                $('#deleteModal').modal('hide');
                deleteLevelId = null;
                showToast('删除成功', 'success');
                loadData();
            },
            error: function() {
                $('#deleteModal').modal('hide');
                showToast('删除失败', 'error');
            }
        });
    });

    function openLinkItems(levelId) {
        $('#linkLevelId').val(levelId);
        // 加载所有护理项目
        $.get('/api/nursing-items', function(itemsResp) {
            var items = itemsResp.data || itemsResp || [];
            // 加载已关联项目
            $.get('/api/nursing-levels/' + levelId + '/items', function(linkResp) {
                var linkedData = linkResp.data || linkResp || [];
                // 统一处理：提取 itemId 数组（若返回对象数组）或直接作为ID数组
                var linkedIds;
                if (linkedData.length > 0 && typeof linkedData[0] === 'object') {
                    linkedIds = linkedData.map(function(li) { return li.itemId; });
                } else {
                    linkedIds = linkedData;
                }
                var html = '';
                items.forEach(function(item) {
                    if (item.isDeleted) return;
                    var checked = linkedIds.indexOf(item.id) >= 0 ? 'checked' : '';
                    html += '<div class="form-check">' +
                        '<input class="form-check-input item-checkbox" type="checkbox" value="' + item.id + '" ' + checked + '>' +
                        '<label class="form-check-label">' + item.name + ' (' + item.code + ')</label>' +
                    '</div>';
                });
                $('#itemCheckboxList').html(html);
                $('#linkItemsModal').modal('show');
            });
        });
    }

    function saveLinkItems() {
        var levelId = $('#linkLevelId').val();
        var itemIds = [];
        $('.item-checkbox:checked').each(function() {
            itemIds.push(parseInt($(this).val()));
        });
        $.ajax({
            url: '/api/nursing-levels/' + levelId + '/items',
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ levelId: parseInt(levelId), itemIds: itemIds }),
            success: function() {
                $('#linkItemsModal').modal('hide');
                showToast('关联保存成功', 'success');
                loadData();
            },
            error: function() { showToast('保存失败', 'error'); }
        });
    }

    $(function() { loadData(); });
    </script>
    </th:block>
</body>
</html>
